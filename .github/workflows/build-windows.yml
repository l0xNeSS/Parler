name: Diagnose Windows Build

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full

jobs:
  build-windows-nsis:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Show environment info
        shell: pwsh
        run: |
          node -v
          bun --version
          rustc -V
          cargo -V

      - name: Install frontend dependencies
        shell: pwsh
        run: |
          bun install

      - name: Tauri info
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path logs | Out-Null
          bun tauri info 2>&1 | Tee-Object -FilePath logs\tauri-info.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build with Tauri directly (verbose)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path logs | Out-Null
          bun tauri build --target x86_64-pc-windows-msvc --bundles nsis -v 2>&1 | Tee-Object -FilePath logs\tauri-build.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Show bundle files
        if: always()
        shell: pwsh
        run: |
          Write-Host "Searching built files..."
          Get-ChildItem -Recurse src-tauri\target -Include *.exe,*.msi | Select-Object FullName, Length

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parler-build-logs
          path: logs\*.log
          if-no-files-found: warn
          retention-days: 30

      - name: Upload exe artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: parler-windows-exe
          path: |
            src-tauri/target/**/bundle/nsis/*.exe
          if-no-files-found: warn
          retention-days: 30
